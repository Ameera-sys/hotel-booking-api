services:
  mysql:
    image: mysql:8.0
    container_name: hotel_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: hotel_db
      MYSQL_USER: hoteluser
      MYSQL_PASSWORD: hotel123

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: hotel_api

    depends_on:
      - mysql

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  mysql_data: